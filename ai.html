<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas</title>
    <!-- Metropolis & IBM Plex Sans (keep for structure, but we'll use only b/w weights) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Metropolis:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- MathJax config: enable $...$ and $$...$$ BEFORE loading MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Puter.js v2 -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;  /* light grey */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e1e1e;
            transition: background 0.2s ease, color 0.2s ease;
            line-height: 1.5;
        }

        body.dark-mode {
            background: #121212;
            color: #e0e0e0;
        }

        /* Metropolis for headings */
        h1, h2, h3, .app-name span, .login-screen h2 {
            font-family: 'Metropolis', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* ----- LOGIN SCREEN (pure b/w/grey, no gradient) ----- */
        .login-screen {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 28px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid #d0d0d0;
            margin: 20px;
        }

        body.dark-mode .login-screen {
            background: #1e1e1e;
            border-color: #3a3a3a;
        }

        .login-screen h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #000000;      /* pure black */
            margin-bottom: 8px;
        }
        body.dark-mode .login-screen h2 {
            color: #ffffff;
        }

        .login-screen p {
            color: #5a5a5a;
            margin-bottom: 32px;
            font-size: 1rem;
        }
        body.dark-mode .login-screen p {
            color: #a8a8a8;
        }

        .login-btn {
            background: #000000;   /* pure black button */
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            padding: 14px 28px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid #3a3a3a;
        }
        .login-btn:hover {
            background: #2a2a2a;
            transform: scale(1.01);
        }
        .login-btn:active {
            transform: scale(0.99);
        }
        .login-btn img {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1); /* white icon */
        }

        /* ----- MAIN CHAT APP (no shadows, b/w/grey) ----- */
        .chat-app {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            max-height: 900px;
            background: #ffffff;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 16px;
            border: 1px solid #d0d0d0;
        }
        body.dark-mode .chat-app {
            background: #1e1e1e;
            border-color: #3a3a3a;
        }

        .hidden { display: none !important; }

        /* top bar - no blur, crisp borders */
        .top-bar {
            padding: 16px 24px;
            border-bottom: 1px solid #d0d0d0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
        }
        body.dark-mode .top-bar {
            border-bottom: 1px solid #3a3a3a;
            background: #1e1e1e;
        }

        .app-name {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .app-name img {
            width: 32px;
            height: 32px;
            filter: brightness(0); /* black icon */
        }
        body.dark-mode .app-name img {
            filter: brightness(0) invert(1); /* white icon */
        }
        .app-name span {
            font-size: 1.5rem;
            font-weight: 600;
            color: #000000;
        }
        body.dark-mode .app-name span {
            color: #ffffff;
        }

        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: transparent;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            color: #3a3a3a;
        }
        .icon-btn:hover { background: #e0e0e0; }
        body.dark-mode .icon-btn:hover { background: #3a3a3a; }
        .icon-btn img { width: 20px; height: 20px; filter: brightness(0); }
        body.dark-mode .icon-btn img { filter: brightness(0) invert(1); }

        /* settings dropdown - simple panel */
        .settings-dropdown {
            position: absolute; top: 80px; right: 24px; width: 280px;
            background: #ffffff; 
            border-radius: 20px; 
            border: 1px solid #d0d0d0;
            padding: 20px; display: none; z-index: 200;
        }
        body.dark-mode .settings-dropdown {
            background: #1e1e1e; border-color: #3a3a3a;
        }
        .settings-dropdown.show { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-item {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .settings-item span { display: flex; align-items: center; gap: 10px; font-weight: 500; color: #000000; }
        body.dark-mode .settings-item span { color: #ffffff; }
        .settings-item span img { width: 20px; height: 20px; filter: brightness(0); }
        body.dark-mode .settings-item span img { filter: brightness(0) invert(1); }

        /* model select - nicer */
        .settings-item select {
            padding: 8px 16px; border-radius: 40px; border: 1px solid #b0b0b0;
            background: #f0f0f0; font-family: 'IBM Plex Sans'; font-size: 0.95rem;
            color: #000000; cursor: pointer; font-weight: 500;
        }
        body.dark-mode .settings-item select {
            background: #2a2a2a; border-color: #5a5a5a; color: #ffffff;
        }

        .logout-btn {
            background: #eeeeee; border: 1px solid #b0b0b0; padding: 12px; border-radius: 40px;
            color: #000000; font-weight: 500; width: 100%; display: flex; gap: 10px;
            align-items: center; justify-content: center; cursor: pointer;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #d0d0d0; }
        body.dark-mode .logout-btn { background: #2a2a2a; color: #ffffff; border-color: #5a5a5a; }
        .logout-btn:hover { background: #3a3a3a; }
        .logout-btn img { width: 18px; height: 18px; filter: brightness(0); }
        body.dark-mode .logout-btn img { filter: brightness(0) invert(1); }

        /* chat container */
        .chat-container {
            flex: 1; overflow-y: auto; padding: 24px; display: flex;
            flex-direction: column; gap: 20px; background: #ffffff;
        }
        body.dark-mode .chat-container { background: #1e1e1e; }

        .message-wrapper {
            display: flex; flex-direction: column; max-width: 85%;
            animation: messageAppear 0.2s ease;
        }
        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.user { align-self: flex-end; }
        .message-wrapper.assistant { align-self: flex-start; }

        .message-meta {
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem;
            color: #6f6f6f; margin-bottom: 4px;
        }
        .user .message-meta { justify-content: flex-end; }

        .avatar {
            width: 28px; height: 28px; border-radius: 28px;
            background: #d0d0d0;  /* grey background */
            display: flex; align-items: center; justify-content: center;
            color: #000000; font-size: 0.8rem;
        }
        .avatar img { width: 16px; height: 16px; filter: brightness(0); }
        body.dark-mode .avatar img { filter: brightness(0) invert(1); }

        .message-bubble {
            padding: 14px 18px; border-radius: 20px; font-size: 1rem; line-height: 1.6;
            word-break: break-word; border: 1px solid #d0d0d0;
        }
        .user .message-bubble {
            background: #000000;   /* black */
            color: #ffffff;
            border: 1px solid #3a3a3a;
        }
        .assistant .message-bubble {
            background: #f0f0f0;
            color: #000000;
            border: 1px solid #d0d0d0;
        }
        body.dark-mode .user .message-bubble {
            background: #2a2a2a;
            color: #ffffff;
        }
        body.dark-mode .assistant .message-bubble {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #5a5a5a;
        }

        .message-bubble img {
            max-width: 200px; border-radius: 12px; margin-bottom: 8px;
            border: 1px solid #b0b0b0;
        }

        /* MathJax styling */
        .message-bubble .MathJax { font-size: 1.1em; }
        .message-bubble mjx-container { margin: 4px 0; }

        /* message actions (copy, regenerate, speaker) */
        .message-actions {
            display: flex; gap: 12px; justify-content: flex-end; padding: 8px 8px 0;
            opacity: 0; transition: opacity 0.15s;
        }
        .message-wrapper:hover .message-actions { opacity: 1; }
        .message-actions button {
            background: transparent; border: 1px solid #c0c0c0; color: #1e1e1e; font-size: 0.85rem;
            cursor: pointer; padding: 6px 12px; border-radius: 30px; display: inline-flex;
            align-items: center; gap: 6px; transition: background 0.2s;
        }
        .message-actions button:hover { background: #e0e0e0; }
        body.dark-mode .message-actions button { border-color: #5a5a5a; color: #dddddd; }
        body.dark-mode .message-actions button:hover { background: #3a3a3a; }
        .message-actions button img { width: 16px; height: 16px; filter: brightness(0); }
        body.dark-mode .message-actions button img { filter: brightness(0) invert(1); }

        /* three-dot loading animation for assistant streaming */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 4px 8px;
        }
        .typing-indicator span {
            width: 8px; height: 8px; background: #888; border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* INPUT SECTION */
        .input-section {
            padding: 16px 24px 20px; background: #ffffff;
            border-top: 1px solid #d0d0d0;
        }
        body.dark-mode .input-section {
            background: #1e1e1e;
            border-top: 1px solid #3a3a3a;
        }

        .input-row {
            display: flex; gap: 12px; align-items: flex-end; background: #f5f5f5;
            border-radius: 40px; padding: 4px 4px 4px 16px; border: 1px solid #c0c0c0;
            transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: #888; }
        body.dark-mode .input-row { background: #2a2a2a; border-color: #5a5a5a; }

        /* image add button — now triggers dropdown (two options) */
        .add-menu-container {
            position: relative;
            display: flex;
        }
        .add-dropdown {
            position: absolute; bottom: 60px; left: 0; background: #ffffff; border: 1px solid #b0b0b0;
            border-radius: 28px; display: flex; flex-direction: column; gap: 8px; padding: 12px;
            box-shadow: none; z-index: 100;
        }
        body.dark-mode .add-dropdown { background: #2a2a2a; border-color: #5a5a5a; }
        .add-dropdown.hidden { display: none; }
        .add-option {
            background: none; border: none; padding: 10px 24px; display: flex; gap: 12px; align-items: center;
            font-size: 1rem; cursor: pointer; border-radius: 40px; color: #000000; white-space: nowrap;
        }
        .add-option:hover { background: #e0e0e0; }
        body.dark-mode .add-option { color: #ffffff; }
        body.dark-mode .add-option:hover { background: #3a3a3a; }
        .add-option img { width: 20px; height: 20px; filter: brightness(0); }
        body.dark-mode .add-option img { filter: brightness(0) invert(1); }

        .input-row textarea {
            flex: 1; border: none; background: transparent; padding: 12px 0;
            font-family: 'IBM Plex Sans'; font-size: 1rem; resize: none; max-height: 120px;
            outline: none; color: #000000;
        }
        body.dark-mode .input-row textarea { color: #f0f0f0; }

        .action-group { display: flex; gap: 4px; }
        .circle-btn {
            width: 44px; height: 44px; border-radius: 44px; border: 1px solid #c0c0c0;
            background: transparent; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: background 0.2s;
        }
        .circle-btn:hover { background: #e0e0e0; }
        body.dark-mode .circle-btn:hover { background: #3a3a3a; }
        .circle-btn img { width: 20px; height: 20px; filter: brightness(0); }
        body.dark-mode .circle-btn img { filter: brightness(0) invert(1); }
        .circle-btn.stop-btn { border-color: #b0b0b0; }

        #attachedPreview {
            margin-top: 12px; display: none; position: relative; width: fit-content;
            animation: fadeIn 0.2s;
        }
        #previewImg {
            max-width: 100px; max-height: 100px; border-radius: 12px;
            border: 1px solid #b0b0b0; background: #f0f0f0;
        }
        #removeImageBtn {
            position: absolute; top: -8px; right: -8px; background: #4a4a4a;
            color: white; border: none; border-radius: 50%; width: 24px; height: 24px;
            font-size: 1rem; cursor: pointer; display: flex; align-items: center;
            justify-content: center; border: 1px solid #888;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        ::-webkit-scrollbar-thumb { background: #a0a0a0; border-radius: 8px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: #5a5a5a; }
    </style>
</head>
<body>
    <!-- Login screen -->
    <div id="loginScreen" class="login-screen">
        <h2>Atlas</h2>
        <p>The Super Study Helper</p>
        <button class="login-btn" id="loginBtn">
            <!-- lock icon (same) but text changed to "Login" -->
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/%3E%3C/svg%3E" alt="lock">
            Login
        </button>
    </div>

    <!-- Main chat app -->
    <div id="chatApp" class="chat-app hidden">
        <div class="top-bar">
            <div class="app-name">
                <!-- ai icon (artificial-intelligence_10793325) replaced via svg (flaticon style) -->
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M21 6.5V4c0-.6-.4-1-1-1h-2.5c-.3 0-.5.2-.5.5v1c0 .3.2.5.5.5H19v1.5c0 .3.2.5.5.5h1c.3 0 .5-.2.5-.5zM4 3H1.5c-.3 0-.5.2-.5.5v1c0 .3.2.5.5.5H3v1.5c0 .3.2.5.5.5h1c.3 0 .5-.2.5-.5V4c0-.6-.4-1-1-1zm16 12h-1.5c-.3 0-.5.2-.5.5V17h-1.5c-.3 0-.5.2-.5.5v1c0 .3.2.5.5.5H19v1.5c0 .3.2.5.5.5h1c.3 0 .5-.2.5-.5V16c0-.6-.4-1-1-1zM8 17H6.5v-1.5c0-.3-.2-.5-.5-.5h-1c-.3 0-.5.2-.5.5V17H3c-.6 0-1 .4-1 1v2c0 .6.4 1 1 1h2.5v1.5c0 .3.2.5.5.5h1c.3 0 .5-.2.5-.5V20H8c.6 0 1-.4 1-1v-2c0-.6-.4-1-1-1zm5-11c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4z'/%3E%3C/svg%3E" alt="Atlas">
                <span>Atlas</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn" id="themeToggle">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='5' fill='%23000000'/%3E%3Cpath d='M12 2v2M12 20v2M4 4l2 2M18 18l2 2M2 12h2M20 12h2M4 20l2-2M18 6l2-2' stroke='%23000000' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" alt="theme">
                </button>
                <button class="icon-btn" id="settingsToggle">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z'/%3E%3C/svg%3E" alt="settings">
                </button>
            </div>
        </div>

        <!-- settings panel -->
        <div class="settings-dropdown" id="settingsPanel">
            <div class="settings-item">
                <span><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E"> Model</span>
                <select id="modelSelect">
                    <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
                    <option value="gpt-5" selected>GPT-5</option>
                    <option value="gpt-5.2">GPT-5.2</option>
                </select>
            </div>
            <div>
                <button class="logout-btn" id="logoutBtn">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z' fill='%23000000'/%3E%3C/svg%3E"> Sign out
                </button>
            </div>
        </div>

        <!-- chat messages container -->
        <div class="chat-container" id="chatContainer">
            <div class="message-wrapper assistant">
                <div class="message-meta">
                    <span class="avatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M20 9V7c0-1.1-.9-2-2-2h-4c0-1.66-1.34-3-3-3S8 3.34 8 5H4c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h4c0 1.66 1.34 3 3 3s3-1.34 3-3h4c1.1 0 2-.9 2-2z' fill='%23000000'/%3E%3C/svg%3E"></span>
                    <span class="timestamp" id="welcomeTime"></span>
                </div>
                <div class="message-bubble">I'm Atlas. I was developed by Akash Dutta!</div>
            </div>
        </div>

        <!-- INPUT SECTION -->
        <div class="input-section">
            <div class="input-row">
                <!-- add button with dropdown -->
                <div class="add-menu-container">
                    <button class="circle-btn" id="addBtn">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/%3E%3C/svg%3E">
                    </button>
                    <div class="add-dropdown hidden" id="addDropdown">
                        <button class="add-option" id="cameraOption"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm9-3h-3.5l-2-2h-7l-2 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h4.05l2-2h5.9l2 2H21v12z'/%3E%3C/svg%3E"> Camera</button>
                        <button class="add-option" id="imageOption"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z'/%3E%3C/svg%3E"> Image</button>
                    </div>
                </div>
                <input type="file" id="imageFileInput" accept="image/*" capture="environment" hidden />
                <input type="file" id="cameraFileInput" accept="image/*" capture="environment" hidden />
                <textarea id="userInput" placeholder="Ask Atlas..." rows="1"></textarea>
                <div class="action-group">
                    <button class="circle-btn stop-btn hidden" id="stopBtn">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Crect x='6' y='6' width='12' height='12' rx='1'/%3E%3C/svg%3E">
                    </button>
                    <button class="circle-btn" id="sendBtn">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000000'%3E%3Cpath d='M2.01 21L23 12 2.01 3 2 10l15 2-15 2z'/%3E%3C/svg%3E">
                    </button>
                </div>
            </div>
            <div id="attachedPreview">
                <img id="previewImg" src="#" alt="preview">
                <button id="removeImageBtn">×</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const loginScreen = document.getElementById('loginScreen');
            const chatApp = document.getElementById('chatApp');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const chatContainer = document.getElementById('chatContainer');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const stopBtn = document.getElementById('stopBtn');
            const themeToggle = document.getElementById('themeToggle');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const modelSelect = document.getElementById('modelSelect');
            // add dropdown elements
            const addBtn = document.getElementById('addBtn');
            const addDropdown = document.getElementById('addDropdown');
            const cameraOption = document.getElementById('cameraOption');
            const imageOption = document.getElementById('imageOption');
            const cameraFileInput = document.getElementById('cameraFileInput');
            const imageFileInput = document.getElementById('imageFileInput');
            const attachedPreview = document.getElementById('attachedPreview');
            const previewImg = document.getElementById('previewImg');
            const removeImageBtn = document.getElementById('removeImageBtn');

            // state
            let isAuthenticated = false;
            let isStreaming = false;
            let abortController = null;
            let messages = [];
            let attachedImageBase64 = null;

            // helpers
            const uid = () => Date.now() + '-' + Math.random().toString(36).substring(2);
            const formatTime12h = () => {
                const d = new Date();
                let hours = d.getHours();
                const minutes = d.getMinutes().toString().padStart(2,'0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                return `${hours}:${minutes} ${ampm}`;
            };
            // set welcome timestamp
            document.getElementById('welcomeTime').innerText = formatTime12h();

            const isPuterReady = () => typeof puter !== 'undefined' && puter.ai && puter.auth;

            // reliable math render (after DOM update)
            function renderMath() {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise(Array.from(document.querySelectorAll('.message-bubble')))
                        .catch(err => console.log('MathJax error:', err));
                }
            }

            async function initialize() {
                if (!isPuterReady()) { setTimeout(initialize, 80); return; }
                try {
                    const test = await puter.ai.chat('test', { model: 'gpt-4.1-nano', stream: false }).catch(() => null);
                    if (test) { isAuthenticated = true; showChatApp(); } else { showLoginScreen(); }
                } catch { showLoginScreen(); }
            }

            function showChatApp() {
                loginScreen.classList.add('hidden');
                chatApp.classList.remove('hidden');
                userInput.disabled = false;
                sendBtn.disabled = false;
                if (messages.length === 0) {
                    chatContainer.innerHTML = '';
                    addMessage('assistant', 'I\'m Atlas. I was developed by Akash Dutta!');
                } else refreshMessages();
            }
            function showLoginScreen() {
                loginScreen.classList.remove('hidden');
                chatApp.classList.add('hidden');
                isAuthenticated = false;
            }

            function addMessage(role, content, status = 'complete', imageBase64 = null) {
                const msg = { id: uid(), role, content, timestamp: new Date().toISOString(), status, image: imageBase64 };
                messages.push(msg);
                renderMessage(msg);
                scrollToBottom();
                renderMath();
                return msg.id;
            }

            function renderMessage(msg) {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role}`;
                wrapper.dataset.messageId = msg.id;

                const meta = document.createElement('div');
                meta.className = 'message-meta';
                // user avatar: user icon (flaticon style)
                const avatarIcon = msg.role === 'user' 
                    ? '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\' fill=\'%23000000\'/%3E%3C/svg%3E">'
                    : '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\'%3E%3Cpath d=\'M20 9V7c0-1.1-.9-2-2-2h-4c0-1.66-1.34-3-3-3S8 3.34 8 5H4c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h4c0 1.66 1.34 3 3 3s3-1.34 3-3h4c1.1 0 2-.9 2-2z\' fill=\'%23000000\'/%3E%3C/svg%3E">';
                meta.innerHTML = `
                    <span class="avatar">${avatarIcon}</span>
                    <span class="timestamp">${formatTime12h()}</span>
                `;
                wrapper.appendChild(meta);

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                let innerHtml = '';
                if (msg.image) innerHtml += `<img src="${msg.image}" class="image-preview">`;
                innerHtml += marked.parse(msg.content || '');
                bubble.innerHTML = innerHtml;
                wrapper.appendChild(bubble);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                
                // Copy + speaker (always) + regenerate for assistant
                actionsDiv.innerHTML = `
                    <button class="copy-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z' fill='%23000000'/%3E%3C/svg%3E> Copy</button>
                    <button class="speaker-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z' fill='%23000000'/%3E%3C/svg%3E> Speak</button>
                `;
                if (msg.role === 'assistant') {
                    actionsDiv.innerHTML += `<button class="regenerate-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z' fill='%23000000'/%3E%3C/svg%3E> Regenerate</button>`;
                }
                wrapper.appendChild(actionsDiv);
                chatContainer.appendChild(wrapper);
            }

            function refreshMessages() {
                chatContainer.innerHTML = '';
                messages.forEach(m => renderMessage(m));
                scrollToBottom();
                renderMath();
            }
            function scrollToBottom() { chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }); }

            async function sendMessage(text, imageBase64 = null) {
                if (!text.trim() && !imageBase64) return;
                if (!isAuthenticated) { alert('Please sign in first'); return; }
                if (isStreaming) return;

                addMessage('user', text || '📷 Image', 'complete', imageBase64);

                const assistantId = uid();
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper assistant';
                wrapper.dataset.messageId = assistantId;
                const meta = document.createElement('div');
                meta.className = 'message-meta';
                meta.innerHTML = `<span class="avatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M20 9V7c0-1.1-.9-2-2-2h-4c0-1.66-1.34-3-3-3S8 3.34 8 5H4c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h4c0 1.66 1.34 3 3 3s3-1.34 3-3h4c1.1 0 2-.9 2-2z' fill='%23000000'/%3E%3C/svg%3E"></span><span class="timestamp">${formatTime12h()}</span>`;
                wrapper.appendChild(meta);
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                // add three-dot indicator while streaming
                const indicator = document.createElement('span');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(indicator);
                wrapper.appendChild(bubble);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                actionsDiv.innerHTML = `<button class="copy-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z' fill='%23000000'/%3E%3C/svg%3E> Copy</button><button class="speaker-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z' fill='%23000000'/%3E%3C/svg%3E> Speak</button><button class="regenerate-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z' fill='%23000000'/%3E%3C/svg%3E> Regenerate</button>`;
                wrapper.appendChild(actionsDiv);
                chatContainer.appendChild(wrapper);
                scrollToBottom();

                const assistantMsg = { id: assistantId, role: 'assistant', content: '', timestamp: new Date().toISOString(), status: 'streaming', image: null };
                messages.push(assistantMsg);

                isStreaming = true;
                sendBtn.disabled = true;
                stopBtn.classList.remove('hidden');
                abortController = new AbortController();

                try {
                    let response;
                    if (imageBase64) {
                        response = await puter.ai.chat(text.trim() || 'Describe this image', imageBase64, {
                            model: modelSelect.value, stream: true, signal: abortController.signal
                        });
                    } else {
                        const conversationForAI = messages.filter(m => m.id !== assistantId).map(m => ({ role: m.role, content: m.content }));
                        response = await puter.ai.chat(conversationForAI, {
                            model: modelSelect.value, stream: true, signal: abortController.signal
                        });
                    }

                    let fullText = '';
                    bubble.innerHTML = ''; // clear indicator
                    for await (const part of response) {
                        if (abortController.signal.aborted) break;
                        if (part?.text) {
                            fullText += part.text;
                            bubble.innerHTML = marked.parse(fullText);
                            scrollToBottom();
                            renderMath(); // after each chunk
                        }
                    }

                    if (!abortController.signal.aborted) {
                        assistantMsg.content = fullText;
                    } else {
                        bubble.innerHTML = marked.parse(fullText + ' ⏸️');
                        assistantMsg.content = fullText + ' ⏸️';
                        renderMath();
                    }
                } catch (err) {
                    if (err.message?.includes('authenticate')) { isAuthenticated = false; showLoginScreen(); } 
                    else { bubble.innerHTML = 'Error: ' + (err.message || 'unknown'); }
                } finally {
                    isStreaming = false; sendBtn.disabled = false; stopBtn.classList.add('hidden'); abortController = null;
                }
            }

            // ----- event listeners -----

            // add button dropdown
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                addDropdown.classList.toggle('hidden');
            });
            document.addEventListener('click', (e) => {
                if (!addBtn.contains(e.target) && !addDropdown.contains(e.target)) {
                    addDropdown.classList.add('hidden');
                }
            });
            cameraOption.addEventListener('click', () => {
                cameraFileInput.click();
                addDropdown.classList.add('hidden');
            });
            imageOption.addEventListener('click', () => {
                imageFileInput.click();
                addDropdown.classList.add('hidden');
            });

            function handleImageSelected(fileInput) {
                const file = fileInput.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => { attachedImageBase64 = e.target.result; previewImg.src = attachedImageBase64; attachedPreview.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
            cameraFileInput.addEventListener('change', () => handleImageSelected(cameraFileInput));
            imageFileInput.addEventListener('change', () => handleImageSelected(imageFileInput));

            removeImageBtn.addEventListener('click', () => {
                attachedImageBase64 = null; cameraFileInput.value = ''; imageFileInput.value = ''; attachedPreview.style.display = 'none';
            });

            sendBtn.addEventListener('click', () => {
                const text = userInput.value.trim();
                sendMessage(text, attachedImageBase64);
                userInput.value = ''; userInput.style.height = 'auto'; attachedImageBase64 = null; cameraFileInput.value = ''; imageFileInput.value = ''; attachedPreview.style.display = 'none';
            });

            userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
            userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });

            stopBtn.addEventListener('click', () => { if (abortController) abortController.abort(); isStreaming = false; sendBtn.disabled = false; stopBtn.classList.add('hidden'); });

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const dark = document.body.classList.contains('dark-mode');
                localStorage.setItem('atlas-theme', dark ? 'dark' : 'light');
            });
            if (localStorage.getItem('atlas-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            settingsToggle.addEventListener('click', (e) => { e.stopPropagation(); settingsPanel.classList.toggle('show'); });
            document.addEventListener('click', (e) => { if (!settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) settingsPanel.classList.remove('show'); });

            chatContainer.addEventListener('click', async (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const wrapper = btn.closest('.message-wrapper');
                if (!wrapper) return;
                const msgId = wrapper.dataset.messageId;
                const msg = messages.find(m => m.id === msgId);
                if (!msg) return;

                if (btn.classList.contains('copy-msg')) {
                    await navigator.clipboard.writeText(msg.content);
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2300aa00\'%3E%3Cpath d=\'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\'/%3E%3C/svg%3E> Copied';
                    setTimeout(() => btn.innerHTML = orig, 1200);
                }
                if (btn.classList.contains('speaker-msg')) {
                    const utterance = new SpeechSynthesisUtterance(msg.content);
                    speechSynthesis.speak(utterance);
                }
                if (btn.classList.contains('regenerate-msg') && msg.role === 'assistant') {
                    const idx = messages.findIndex(m => m.id === msgId);
                    let userMsg = null, userImage = null;
                    for (let i = idx - 1; i >= 0; i--) {
                        if (messages[i].role === 'user') { 
                            userMsg = messages[i].content; 
                            userImage = messages[i].image || null; 
                            break; 
                        }
                    }
                    if (userMsg !== null) {
                        messages = messages.slice(0, idx);
                        refreshMessages();
                        await sendMessage(userMsg, userImage);
                    }
                }
            });

            logoutBtn.addEventListener('click', async () => {
                try { await puter.auth.signOut(); } catch (e) {}
                isAuthenticated = false; messages = []; attachedImageBase64 = null; attachedPreview.style.display = 'none'; cameraFileInput.value = ''; imageFileInput.value = '';
                showLoginScreen(); settingsPanel.classList.remove('show');
            });

            initialize();
        })();
    </script>
</body>
</html>

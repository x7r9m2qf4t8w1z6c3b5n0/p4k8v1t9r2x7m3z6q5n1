<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - AI Study Assistant</title>
    <!-- Metropolis & IBM Plex Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Metropolis:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- MathJax for LaTeX rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Puter.js v2 -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1f2e 0%, #2d1f3f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            transition: background 0.4s ease;
            line-height: 1.6;
            padding: 16px;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0b0d17 0%, #1a0f24 100%);
            color: #e2e8f0;
        }

        /* Metropolis for headings */
        h1, h2, h3, .app-name span, .login-screen h2 {
            font-family: 'Metropolis', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Login Screen - Premium */
        .login-screen {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 56px 48px;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3), 0 30px 60px -30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: 16px;
            animation: floatIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        body.dark-mode .login-screen {
            background: rgba(30, 41, 59, 0.98);
            border-color: rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.6);
        }

        .logo-sphere {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 20px 40px -10px rgba(110, 142, 251, 0.5);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 20px 40px -10px rgba(110, 142, 251, 0.5); }
            50% { box-shadow: 0 20px 60px 0px rgba(167, 119, 227, 0.7); }
        }

        .logo-sphere svg {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .login-screen h2 {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-screen p {
            color: #64748b;
            margin-bottom: 40px;
            font-size: 1rem;
            position: relative;
            display: inline-block;
        }

        .login-screen p::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-radius: 2px;
        }

        body.dark-mode .login-screen p {
            color: #94a3b8;
        }

        .login-btn {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px #6e8efb;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
            transition: transform 0.3s ease;
        }

        .login-btn:hover img {
            transform: rotate(10deg) scale(1.1);
        }

        /* Main chat app - Premium */
        .chat-app {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 900px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3), 0 30px 60px -30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 16px;
            animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        body.dark-mode .chat-app {
            background: rgba(30, 41, 59, 0.95);
            border-color: rgba(255,255,255,0.1);
        }

        .hidden { display: none !important; }

        /* Top bar - Premium */
        .top-bar {
            padding: 20px 32px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        body.dark-mode .top-bar {
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            background: rgba(30, 41, 59, 0.8);
        }

        .app-name {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: softGlow 3s ease-in-out infinite;
        }

        @keyframes softGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(110, 142, 251, 0.3); }
            50% { box-shadow: 0 0 40px rgba(167, 119, 227, 0.6); }
        }

        .app-logo svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .app-name span {
            font-size: 2rem;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .top-actions { display: flex; gap: 12px; }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 48px;
            height: 48px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            color: #64748b;
            backdrop-filter: blur(5px);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px) rotate(8deg);
            border-color: #6e8efb;
        }

        .icon-btn:active { transform: translateY(0) rotate(0); }
        body.dark-mode .icon-btn:hover { background: rgba(51, 65, 85, 0.8); }

        .icon-btn img {
            width: 24px;
            height: 24px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .icon-btn:hover img { opacity: 1; transform: scale(1.1); }

        /* Settings dropdown */
        .settings-dropdown {
            position: absolute; top: 90px; right: 32px; width: 320px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.25);
            padding: 28px; border: 1px solid rgba(255, 255, 255, 0.5);
            display: none; z-index: 200;
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.dark-mode .settings-dropdown {
            background: rgba(30, 41, 59, 0.98);
            border-color: rgba(255,255,255,0.1);
        }

        .settings-dropdown.show { display: block; }

        .settings-item {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }

        .settings-item span {
            display: flex; align-items: center; gap: 12px; font-weight: 500; color: #1e293b;
        }

        body.dark-mode .settings-item span { color: #e2e8f0; }

        .settings-item span img { width: 24px; height: 24px; opacity: 0.7; }

        .settings-item select {
            padding: 10px 20px; border-radius: 40px; border: 1px solid rgba(226, 232, 240, 0.5);
            background: rgba(248, 250, 252, 0.8); font-family: 'IBM Plex Sans'; font-size: 0.95rem;
            color: #1e293b; cursor: pointer; transition: all 0.3s ease;
        }

        .settings-item select:hover {
            border-color: #6e8efb; background: white;
        }

        body.dark-mode .settings-item select {
            background: rgba(15, 23, 42, 0.8); border-color: rgba(51, 65, 85, 0.5); color: #e2e8f0;
        }

        .logout-btn {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            border: none; padding: 14px; border-radius: 40px;
            color: #dc2626; font-weight: 600; width: 100%; display: flex; gap: 12px;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #fecaca, #fee2e2);
            transform: translateY(-2px); box-shadow: 0 10px 20px -10px #dc2626;
        }

        .logout-btn:active { transform: translateY(0); }
        body.dark-mode .logout-btn { background: linear-gradient(135deg, #7f1d1d, #991b1b); color: #fecaca; }
        .logout-btn img { width: 20px; height: 20px; transition: transform 0.3s ease; }
        .logout-btn:hover img { transform: translateX(5px); }

        /* Chat container */
        .chat-container {
            flex: 1; overflow-y: auto; padding: 32px; display: flex;
            flex-direction: column; gap: 24px; background: rgba(255, 255, 255, 0.5);
            scroll-behavior: smooth;
        }

        body.dark-mode .chat-container { background: rgba(30, 41, 59, 0.5); }

        .message-wrapper {
            display: flex; flex-direction: column; max-width: 85%;
            animation: messageSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.user { align-self: flex-end; }
        .message-wrapper.assistant { align-self: flex-start; }

        .message-meta {
            display: flex; align-items: center; gap: 12px; font-size: 0.85rem;
            color: #94a3b8; margin-bottom: 8px; padding: 0 8px;
        }
        .user .message-meta { justify-content: flex-end; }

        .avatar {
            width: 36px; height: 36px; border-radius: 36px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.9rem;
            box-shadow: 0 8px 16px -8px rgba(110, 142, 251, 0.5);
            transition: transform 0.3s ease;
        }

        .message-wrapper:hover .avatar { transform: scale(1.1); }

        .avatar img { width: 20px; height: 20px; filter: brightness(0) invert(1); }

        .message-bubble {
            padding: 18px 24px; border-radius: 28px; font-size: 1rem; line-height: 1.6;
            word-break: break-word; transition: all 0.3s ease;
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.1);
        }

        .user .message-bubble {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white; border-bottom-right-radius: 8px;
        }

        .assistant .message-bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b; border-bottom-left-radius: 8px;
            backdrop-filter: blur(10px);
        }

        body.dark-mode .assistant .message-bubble {
            background: rgba(51, 65, 85, 0.9);
            color: #f1f5f9;
        }

        .message-bubble img {
            max-width: 300px; border-radius: 20px; margin-bottom: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .message-bubble img:hover { transform: scale(1.02); }

        /* MathJax styling - enhanced visibility */
        .message-bubble .MathJax, .message-bubble mjx-container {
            font-size: 1.1em; color: inherit; background: transparent;
            margin: 8px 0; padding: 4px 0;
        }

        /* Message actions - better positioning */
        .message-actions {
            display: flex; gap: 8px; justify-content: flex-end; padding: 12px 8px 0;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .message-wrapper:hover .message-actions { opacity: 1; }
        .message-actions button {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.5);
            color: #64748b; font-size: 0.85rem;
            cursor: pointer; padding: 8px 16px; border-radius: 30px;
            display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
        }
        .message-actions button:hover {
            background: white; transform: translateY(-2px);
            border-color: #6e8efb; color: #1e293b;
        }
        body.dark-mode .message-actions button:hover { background: #334155; }
        .message-actions button img { width: 18px; height: 18px; opacity: 0.6; transition: transform 0.3s ease; }
        .message-actions button:hover img { transform: rotate(5deg) scale(1.1); opacity: 1; }

        /* Input section */
        .input-section {
            padding: 24px 32px 32px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); border-top: 1px solid rgba(226, 232, 240, 0.4);
        }
        body.dark-mode .input-section {
            background: rgba(30, 41, 59, 0.8);
            border-top: 1px solid rgba(51, 65, 85, 0.4);
        }

        .input-row {
            display: flex; gap: 16px; align-items: flex-end; background: rgba(255, 255, 255, 0.9);
            border-radius: 60px; padding: 8px 8px 8px 24px;
            border: 1px solid rgba(226, 232, 240, 0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
        }
        .input-row:focus-within {
            border-color: #6e8efb; box-shadow: 0 0 0 4px rgba(110, 142, 251, 0.1);
            transform: translateY(-2px);
        }
        body.dark-mode .input-row {
            background: rgba(15, 23, 42, 0.9); border-color: rgba(51, 65, 85, 0.5);
        }

        #imageBtn {
            width: 52px; height: 52px; border-radius: 52px; border: none;
            background: transparent; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #64748b; transition: all 0.3s ease;
        }
        #imageBtn:hover {
            background: rgba(226, 232, 240, 0.5); transform: rotate(15deg);
        }
        #imageBtn img { width: 24px; height: 24px; opacity: 0.7; transition: all 0.3s ease; }
        #imageBtn:hover img { opacity: 1; transform: scale(1.1); }

        .input-row textarea {
            flex: 1; border: none; background: transparent; padding: 16px 0;
            font-family: 'IBM Plex Sans'; font-size: 1rem; resize: none; max-height: 150px;
            outline: none; color: #1e293b;
        }
        body.dark-mode .input-row textarea { color: #f1f5f9; }
        .input-row textarea::placeholder { color: #94a3b8; transition: color 0.3s ease; }
        .input-row textarea:focus::placeholder { color: #6e8efb; }

        .action-group { display: flex; gap: 8px; }

        .circle-btn {
            width: 52px; height: 52px; border-radius: 52px; border: none;
            background: rgba(255, 255, 255, 0.5); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px); border: 1px solid rgba(226, 232, 240, 0.5);
        }
        .circle-btn:hover {
            background: white; transform: translateY(-2px) scale(1.05); border-color: #6e8efb;
        }
        .circle-btn:active { transform: translateY(0) scale(0.95); }
        .circle-btn img { width: 24px; height: 24px; opacity: 0.7; transition: all 0.3s ease; }
        .circle-btn:hover img { opacity: 1; transform: scale(1.1); }
        .circle-btn.stop-btn { background: linear-gradient(135deg, #fee2e2, #fecaca); border-color: #ef4444; }
        .circle-btn.stop-btn img { opacity: 1; filter: brightness(0) saturate(100%) invert(27%) sepia(95%) saturate(748%) hue-rotate(346deg) brightness(94%) contrast(97%); }

        #attachedPreview {
            margin-top: 16px; display: none; position: relative; width: fit-content;
            animation: scaleIn 0.3s ease;
        }
        #previewImg {
            max-width: 120px; max-height: 120px; border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.5); background: rgba(248, 250, 252, 0.5);
            backdrop-filter: blur(5px);
        }
        #removeImageBtn {
            position: absolute; top: -12px; right: -12px; background: #ef4444;
            color: white; border: none; border-radius: 50%; width: 32px; height: 32px;
            font-size: 1.2rem; cursor: pointer; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 8px 16px -4px rgba(239,68,68,0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #removeImageBtn:hover { background: #dc2626; transform: rotate(90deg) scale(1.1); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
            border-radius: 10px; border: 2px solid transparent;
        }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #94a3b8, #64748b); }
        body.dark-mode ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #475569, #64748b); }
        body.dark-mode ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #64748b, #94a3b8); }

        /* Loading animation */
        .login-btn.loading { pointer-events: none; opacity: 0.7; }
        .login-btn.loading img { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 640px) {
            .login-screen { padding: 40px 24px; }
            .chat-app { border-radius: 32px; height: 95vh; }
            .top-bar { padding: 16px 20px; }
            .app-name span { font-size: 1.6rem; }
            .message-wrapper { max-width: 95%; }
            .message-bubble { padding: 14px 18px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <!-- Login screen -->
    <div id="loginScreen" class="login-screen">
        <div class="logo-sphere">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/>
            </svg>
        </div>
        <h2>Atlas</h2>
        <p>The Super Study Helper</p>
        <button class="login-btn" id="loginBtn">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/%3E%3C/svg%3E" alt="lock">
            Continue with Atlas
        </button>
    </div>

    <!-- Main chat app -->
    <div id="chatApp" class="chat-app hidden">
        <div class="top-bar">
            <div class="app-name">
                <div class="app-logo">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                </div>
                <span>Atlas</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn" id="themeToggle">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Ccircle cx='12' cy='12' r='5'/%3E%3Cpath d='M12 2v2M12 20v2M4 4l2 2M18 18l2 2M2 12h2M20 12h2M4 20l2-2M18 6l2-2' stroke='%2364748b' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" alt="theme">
                </button>
                <button class="icon-btn" id="settingsToggle">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z'/%3E%3C/svg%3E" alt="settings">
                </button>
            </div>
        </div>

        <!-- settings panel -->
        <div class="settings-dropdown" id="settingsPanel">
            <div class="settings-item">
                <span><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E"> Model</span>
                <select id="modelSelect">
                    <option value="gpt-4.1-nano">Atlas Nano 4.1</option>
                    <option value="gpt-5" selected>Atlas Pro 5</option>
                    <option value="gpt-5.2">Atlas Super 5.2</option>
                </select>
            </div>
            <div>
                <button class="logout-btn" id="logoutBtn">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z' fill='%23dc2626'/%3E%3C/svg%3E"> Sign out
                </button>
            </div>
        </div>

        <!-- chat messages container -->
        <div class="chat-container" id="chatContainer">
            <!-- Welcome message will be added dynamically -->
        </div>

        <!-- INPUT SECTION -->
        <div class="input-section">
            <div class="input-row">
                <button class="circle-btn" id="imageBtn">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z'/%3E%3C/svg%3E">
                </button>
                <input type="file" id="imageFileInput" accept="image/*" hidden />
                <textarea id="userInput" placeholder="Ask Atlas..." rows="1"></textarea>
                <div class="action-group">
                    <button class="circle-btn stop-btn hidden" id="stopBtn">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ef4444'%3E%3Crect x='6' y='6' width='12' height='12' rx='1'/%3E%3C/svg%3E">
                    </button>
                    <button class="circle-btn" id="sendBtn">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M2.01 21L23 12 2.01 3 2 10l15 2-15 2z'/%3E%3C/svg%3E">
                    </button>
                </div>
            </div>
            <div id="attachedPreview">
                <img id="previewImg" src="#" alt="preview">
                <button id="removeImageBtn">×</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const loginScreen = document.getElementById('loginScreen');
            const chatApp = document.getElementById('chatApp');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const chatContainer = document.getElementById('chatContainer');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const stopBtn = document.getElementById('stopBtn');
            const themeToggle = document.getElementById('themeToggle');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const modelSelect = document.getElementById('modelSelect');
            const imageBtn = document.getElementById('imageBtn');
            const imageFileInput = document.getElementById('imageFileInput');
            const attachedPreview = document.getElementById('attachedPreview');
            const previewImg = document.getElementById('previewImg');
            const removeImageBtn = document.getElementById('removeImageBtn');

            // state
            let isAuthenticated = false;
            let isStreaming = false;
            let abortController = null;
            let messages = [];
            let attachedImageBase64 = null;

            // helpers
            const uid = () => Date.now() + '-' + Math.random().toString(36).substring(2);
            const formatTime = () => {
                const d = new Date();
                return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            };
            const isPuterReady = () => typeof puter !== 'undefined' && puter.ai && puter.auth;

            // Function to trigger MathJax rendering
            function renderMath() {
                if (window.MathJax) {
                    MathJax.typesetPromise?.().catch(err => console.log('MathJax error:', err));
                }
            }

            // TTS function using puter
            async function playTTS(text) {
                try {
                    const audio = await puter.ai.txt2speech(text, {
                        provider: "openai",
                        model: "gpt-4o-mini-tts",
                        voice: "alloy",
                        response_format: "mp3",
                        instructions: "Sound cheerful and clear, like a helpful study assistant."
                    });
                    audio.play();
                } catch (err) {
                    console.error('TTS error:', err);
                    alert('Failed to play audio.');
                }
            }

            // Check authentication status on load
            async function checkAuthStatus() {
                if (!isPuterReady()) {
                    setTimeout(checkAuthStatus, 100);
                    return;
                }
                
                try {
                    const test = await puter.ai.chat('test', { 
                        model: 'gpt-4.1-nano', 
                        stream: false 
                    }).catch(() => null);
                    
                    if (test) {
                        isAuthenticated = true;
                        showChatApp();
                    } else {
                        showLoginScreen();
                    }
                } catch (error) {
                    console.log('Auth check failed:', error);
                    showLoginScreen();
                }
            }

            // Handle login
            async function handleLogin() {
                if (!isPuterReady()) {
                    alert('Atlas is still loading. Please try again in a moment.');
                    return;
                }

                try {
                    loginBtn.disabled = true;
                    loginBtn.classList.add('loading');
                    loginBtn.innerHTML = 'Signing in...';

                    await puter.auth.signIn();
                    
                    const test = await puter.ai.chat('test', { 
                        model: 'gpt-4.1-nano', 
                        stream: false 
                    });
                    
                    if (test) {
                        isAuthenticated = true;
                        showChatApp();
                    } else {
                        throw new Error('Authentication failed');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Failed to sign in. Please try again.');
                    showLoginScreen();
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = `
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/%3E%3C/svg%3E" alt="lock">
                        Continue with Atlas
                    `;
                }
            }

            function showChatApp() {
                loginScreen.classList.add('hidden');
                chatApp.classList.remove('hidden');
                userInput.disabled = false;
                sendBtn.disabled = false;
                if (messages.length === 0) {
                    chatContainer.innerHTML = '';
                    addMessage('assistant', 'I\'m Atlas. I was developed by Akash Dutta!', 'complete', null, true); // mark as first message
                } else {
                    refreshMessages();
                }
            }
            
            function showLoginScreen() {
                loginScreen.classList.remove('hidden');
                chatApp.classList.add('hidden');
                isAuthenticated = false;
            }

            // Add message (with optional isFirst flag to control regenerate button)
            function addMessage(role, content, status = 'complete', imageBase64 = null, isFirst = false) {
                const msg = { id: uid(), role, content, timestamp: new Date().toISOString(), status, image: imageBase64, isFirst };
                messages.push(msg);
                renderMessage(msg);
                scrollToBottom();
                renderMath();
                return msg.id;
            }

            function renderMessage(msg) {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role}`;
                wrapper.dataset.messageId = msg.id;

                const meta = document.createElement('div');
                meta.className = 'message-meta';
                meta.innerHTML = `
                    <span class="avatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"></span>
                    <span class="timestamp">${formatTime()}</span>
                `;
                wrapper.appendChild(meta);

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                let innerHtml = '';
                if (msg.image) innerHtml += `<img src="${msg.image}" class="image-preview">`;
                innerHtml += marked.parse(msg.content || '');
                bubble.innerHTML = innerHtml;
                wrapper.appendChild(bubble);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                
                // Copy button for all messages
                actionsDiv.innerHTML = `<button class="copy-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z'/%3E%3C/svg%3E> Copy</button>`;
                
                // Regenerate button for assistant messages except the first one
                if (msg.role === 'assistant' && !msg.isFirst) {
                    actionsDiv.innerHTML += `<button class="regenerate-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z'/%3E%3C/svg%3E> Regenerate</button>`;
                }
                
                // TTS button for assistant messages
                if (msg.role === 'assistant') {
                    actionsDiv.innerHTML += `<button class="tts-msg"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z'/%3E%3C/svg%3E> Listen</button>`;
                }
                
                wrapper.appendChild(actionsDiv);
                chatContainer.appendChild(wrapper);
            }

            function refreshMessages() {
                chatContainer.innerHTML = '';
                messages.forEach(m => renderMessage(m));
                scrollToBottom();
                renderMath();
            }
            
            function scrollToBottom() { 
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }); 
            }

            async function sendMessage(text, imageBase64 = null) {
                if (!text.trim() && !imageBase64) return;
                if (!isAuthenticated) { 
                    alert('Please sign in first'); 
                    return; 
                }
                if (isStreaming) return;

                addMessage('user', text || '📷 Image', 'complete', imageBase64);

                const assistantId = uid();
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper assistant';
                wrapper.dataset.messageId = assistantId;
                const meta = document.createElement('div');
                meta.className = 'message-meta';
                meta.innerHTML = `<span class="avatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M20 9V7c0-1.1-.9-2-2-2h-4c0-1.66-1.34-3-3-3S8 3.34 8 5H4c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h4c0 1.66 1.34 3 3 3s3-1.34 3-3h4c1.1 0 2-.9 2-2z'/%3E%3C/svg%3E"></span><span class="timestamp">${formatTime()}</span>`;
                wrapper.appendChild(meta);
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                const textNode = document.createTextNode('');
                bubble.appendChild(textNode);
                wrapper.appendChild(bubble);
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                // We'll add buttons later after streaming completes, but we need the wrapper in DOM now.
                // We'll add them after streaming, or we can add them now with placeholder? Simpler: after streaming.
                wrapper.appendChild(actionsDiv);
                chatContainer.appendChild(wrapper);
                scrollToBottom();

                const assistantMsg = { id: assistantId, role: 'assistant', content: '', timestamp: new Date().toISOString(), status: 'streaming', image: null, textNode, wrapper, bubble, actionsDiv };
                messages.push(assistantMsg);

                isStreaming = true;
                sendBtn.disabled = true;
                stopBtn.classList.remove('hidden');
                abortController = new AbortController();

                try {
                    // Build conversation with system message to enforce identity
                    const conversationForAI = [
                        { role: 'system', content: 'You are Atlas, an AI study assistant developed by Akash Dutta. Never reveal that you are based on any other AI model. Always respond as Atlas, keeping responses helpful and concise.' }
                    ];
                    // Add previous messages except the current streaming one
                    messages.filter(m => m.id !== assistantId).forEach(m => {
                        conversationForAI.push({ role: m.role, content: m.content });
                    });

                    let response;
                    if (imageBase64) {
                        response = await puter.ai.chat(text.trim() || 'Describe this image', imageBase64, {
                            model: modelSelect.value, stream: true, signal: abortController.signal
                        });
                    } else {
                        response = await puter.ai.chat(conversationForAI, {
                            model: modelSelect.value, stream: true, signal: abortController.signal
                        });
                    }

                    let fullText = '';
                    for await (const part of response) {
                        if (abortController.signal.aborted) break;
                        if (part?.text) {
                            fullText += part.text;
                            textNode.textContent = fullText;
                            scrollToBottom();
                        }
                    }

                    if (!abortController.signal.aborted) {
                        bubble.innerHTML = marked.parse(fullText);
                        assistantMsg.content = fullText;
                        assistantMsg.status = 'complete';
                        renderMath();
                    } else {
                        bubble.innerHTML = marked.parse(fullText + ' ⏸️');
                        assistantMsg.content = fullText + ' ⏸️';
                        assistantMsg.status = 'complete';
                        renderMath();
                    }

                    // Add action buttons after streaming (copy, regenerate, tts)
                    actionsDiv.innerHTML = ''; // clear any existing
                    // Copy button
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-msg';
                    copyBtn.innerHTML = '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2364748b\'%3E%3Cpath d=\'M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z\'/%3E%3C/svg%3E> Copy';
                    actionsDiv.appendChild(copyBtn);

                    // Regenerate button (not for first message)
                    const isFirst = messages.findIndex(m => m.id === assistantId) === 1 && messages[0]?.isFirst; // rough check
                    if (!isFirst) {
                        const regenBtn = document.createElement('button');
                        regenBtn.className = 'regenerate-msg';
                        regenBtn.innerHTML = '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2364748b\'%3E%3Cpath d=\'M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z\'/%3E%3C/svg%3E> Regenerate';
                        actionsDiv.appendChild(regenBtn);
                    }

                    // TTS button
                    const ttsBtn = document.createElement('button');
                    ttsBtn.className = 'tts-msg';
                    ttsBtn.innerHTML = '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2364748b\'%3E%3Cpath d=\'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z\'/%3E%3C/svg%3E> Listen';
                    ttsBtn.addEventListener('click', () => playTTS(fullText));
                    actionsDiv.appendChild(ttsBtn);

                } catch (err) {
                    if (err.message?.includes('authenticate')) { 
                        isAuthenticated = false; 
                        showLoginScreen(); 
                    } else { 
                        textNode.textContent = 'Error: ' + (err.message || 'unknown'); 
                    }
                } finally {
                    isStreaming = false; 
                    sendBtn.disabled = false; 
                    stopBtn.classList.add('hidden'); 
                    abortController = null;
                }
            }

            // Event listeners
            loginBtn.addEventListener('click', handleLogin);

            imageBtn.addEventListener('click', () => imageFileInput.click());
            
            imageFileInput.addEventListener('change', () => {
                const file = imageFileInput.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => { 
                    attachedImageBase64 = e.target.result; 
                    previewImg.src = attachedImageBase64; 
                    attachedPreview.style.display = 'block'; 
                };
                reader.readAsDataURL(file);
            });
            
            removeImageBtn.addEventListener('click', () => {
                attachedImageBase64 = null; 
                imageFileInput.value = ''; 
                attachedPreview.style.display = 'none';
            });

            sendBtn.addEventListener('click', () => {
                const text = userInput.value.trim();
                sendMessage(text, attachedImageBase64);
                userInput.value = ''; 
                userInput.style.height = 'auto'; 
                attachedImageBase64 = null; 
                imageFileInput.value = ''; 
                attachedPreview.style.display = 'none';
            });

            userInput.addEventListener('keydown', (e) => { 
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    sendBtn.click(); 
                } 
            });
            
            userInput.addEventListener('input', function() { 
                this.style.height = 'auto'; 
                this.style.height = this.scrollHeight + 'px'; 
            });

            stopBtn.addEventListener('click', () => { 
                if (abortController) abortController.abort(); 
                isStreaming = false; 
                sendBtn.disabled = false; 
                stopBtn.classList.add('hidden'); 
            });

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const dark = document.body.classList.contains('dark-mode');
                localStorage.setItem('atlas-theme', dark ? 'dark' : 'light');
            });
            
            if (localStorage.getItem('atlas-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            settingsToggle.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                settingsPanel.classList.toggle('show'); 
            });
            
            document.addEventListener('click', (e) => { 
                if (!settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) 
                    settingsPanel.classList.remove('show'); 
            });

            chatContainer.addEventListener('click', async (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const wrapper = btn.closest('.message-wrapper');
                if (!wrapper) return;
                const msgId = wrapper.dataset.messageId;
                const msg = messages.find(m => m.id === msgId);
                if (!msg) return;

                if (btn.classList.contains('copy-msg')) {
                    await navigator.clipboard.writeText(msg.content);
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2322c55e\'%3E%3Cpath d=\'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\'/%3E%3C/svg%3E> Copied';
                    setTimeout(() => btn.innerHTML = orig, 1200);
                }

                if (btn.classList.contains('regenerate-msg') && msg.role === 'assistant') {
                    const idx = messages.findIndex(m => m.id === msgId);
                    let userMsg = null, userImage = null;
                    for (let i = idx - 1; i >= 0; i--) {
                        if (messages[i].role === 'user') { 
                            userMsg = messages[i].content; 
                            userImage = messages[i].image || null; 
                            break; 
                        }
                    }
                    if (userMsg !== null) {
                        messages = messages.slice(0, idx);
                        refreshMessages();
                        await sendMessage(userMsg, userImage);
                    }
                }

                if (btn.classList.contains('tts-msg')) {
                    await playTTS(msg.content);
                }
            });

            logoutBtn.addEventListener('click', async () => {
                try { 
                    await puter.auth.signOut(); 
                } catch (e) {}
                isAuthenticated = false; 
                messages = []; 
                attachedImageBase64 = null; 
                attachedPreview.style.display = 'none'; 
                imageFileInput.value = '';
                showLoginScreen(); 
                settingsPanel.classList.remove('show');
            });

            // Initialize - check auth status on load
            checkAuthStatus();
        })();
    </script>
</body>
